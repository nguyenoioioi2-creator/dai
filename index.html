<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tappy Turtle</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#87CEEB}
canvas{display:block}
#menu,#gameover{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}
#menu{
background:linear-gradient(#87ceeb,#dff6ff);
}
#gameover{
display:none;
background:rgba(0,0,0,.7);
color:white;
}
h1{
font-size:50px;
color:white;
text-shadow:3px 3px #333;
margin-bottom:20px;
}
button{
padding:15px 35px;
font-size:24px;
border:none;
border-radius:12px;
}
</style>
</head>
<body>

<div id="menu">
<h1>TAPPY TURTLE</h1>
<button id="play">PLAY</button>
</div>

<div id="gameover">
<h1>GAME OVER</h1>
<div id="scoreText"></div>
<br>
<button onclick="location.reload()">CHƠI LẠI</button>
</div>

<canvas id="c"></canvas>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let turtle,pipes=[],score=0,run=false;

function reset(){
turtle={
x:120,
y:canvas.height/2,
vy:0,
r:20
};
pipes=[];
score=0;
}

function spawnPipe(){

let gap=220;

let topHeight=
Math.random()*(canvas.height-400)+100;

pipes.push({
x:canvas.width,
top:topHeight,
bottom:topHeight+gap,
passed:false
});

}

function drawTurtle(){

ctx.save();
ctx.translate(turtle.x,turtle.y);

ctx.fillStyle="#4CAF50";
ctx.beginPath();
ctx.arc(0,0,20,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="#2E7D32";
ctx.beginPath();
ctx.arc(0,0,12,0,Math.PI*2);
ctx.fill();

ctx.restore();

}

function drawPipe(p){

ctx.fillStyle="#8B5A2B";

ctx.fillRect(
p.x,
0,
70,
p.top
);

ctx.fillRect(
p.x,
p.bottom,
70,
canvas.height
);

/* gai trên */

ctx.fillStyle="#ddd";

for(let y=p.top-35;y>0;y-=35){

ctx.beginPath();
ctx.moveTo(p.x,y);
ctx.lineTo(p.x+35,y-35);
ctx.lineTo(p.x+70,y);
ctx.fill();

}

/* gai dưới */

for(let y=p.bottom+35;y<canvas.height;y+=35){

ctx.beginPath();
ctx.moveTo(p.x,y);
ctx.lineTo(p.x+35,y+35);
ctx.lineTo(p.x+70,y);
ctx.fill();

}

}

function gameOver(){

run=false;

document.getElementById(
"scoreText"
).innerHTML=
"Điểm: "+score;

document.getElementById(
"gameover"
).style.display="flex";

}

function update(){

turtle.vy+=0.45;
turtle.y+=turtle.vy;

if(
turtle.y<0 ||
turtle.y>canvas.height
){
gameOver();
}

for(let p of pipes){

p.x-=4;

if(
turtle.x+turtle.r>p.x &&
turtle.x-turtle.r<p.x+70
){

if(
turtle.y-turtle.r<p.top ||
turtle.y+turtle.r>p.bottom
){
gameOver();
}

}

if(
!p.passed &&
p.x+70<turtle.x
){
score++;
p.passed=true;
}

}

pipes=pipes.filter(
p=>p.x>-100
);

}

function draw(){

ctx.clearRect(
0,0,
canvas.width,
canvas.height
);

/* trời */

let g=
ctx.createLinearGradient(
0,0,0,canvas.height
);

g.addColorStop(0,"#87CEEB");
g.addColorStop(1,"#E0F7FF");

ctx.fillStyle=g;
ctx.fillRect(
0,0,
canvas.width,
canvas.height
);

/* mây */

ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(200,100,30,0,7);
ctx.arc(240,100,35,0,7);
ctx.arc(280,100,30,0,7);
ctx.fill();

for(let p of pipes)
drawPipe(p);

drawTurtle();

ctx.fillStyle="white";
ctx.font="40px Arial";
ctx.fillText(
score,
canvas.width/2,
60
);

}

function loop(){

if(!run) return;

update();
draw();

requestAnimationFrame(loop);

}

function jump(){
if(run)
turtle.vy=-8;
}

document.getElementById(
"play"
).onclick=()=>{

document.getElementById(
"menu"
).style.display="none";

reset();

run=true;

setInterval(()=>{
if(run)
spawnPipe();
},1800);

loop();

};

addEventListener("click",jump);
addEventListener("touchstart",jump);

</script>

</body>
</html>
